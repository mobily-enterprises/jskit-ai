name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  npm_config_engine_strict: "true"
  npm_config_strict_allow_scripts: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24
          - 26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run security:audit

      - name: Run verify
        run: npm run verify

  database-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        database:
          - mariadb
          - postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify a clean database-backed app
        env:
          JSKIT_DATABASE_INTEGRATION_DRIVER: ${{ matrix.database }}
        run: node --test tooling/create-app/test/databaseCi.integration.test.js

  vite-cold-start:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx --yes --allow-scripts=fsevents playwright@1.61.1 install --with-deps chromium

      - name: Verify a cold generated auth app
        env:
          JSKIT_VITE_COLD_START_INTEGRATION: "1"
        run: node --test tooling/create-app/test/viteColdStart.integration.test.js

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
      - database-ci
      - vite-cold-start
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/agent-docs/site/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
