name: Docs Quality

on:
  pull_request:
    paths:
      - "docs/**"
      - "package.json"
      - ".github/workflows/docs-quality.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - ".github/workflows/docs-quality.yml"

jobs:
  docs-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify docs/examples consistency
        run: node ./docs/scripts/verify-doc-examples.mjs
