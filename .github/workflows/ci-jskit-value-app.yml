name: CI - jskit-value-app

on:
  push:
    branches:
      - main
      - master
    paths:
      - "apps/jskit-value-app/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "AGENT.md"
      - "AGENTS.md"
      - "RAILS.md"
      - "LLM_CHECKLIST.md"
      - "scripts/llm-preflight.sh"
      - ".github/workflows/ci-jskit-value-app.yml"
  pull_request:
    paths:
      - "apps/jskit-value-app/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "AGENT.md"
      - "AGENTS.md"
      - "RAILS.md"
      - "LLM_CHECKLIST.md"
      - "scripts/llm-preflight.sh"
      - ".github/workflows/ci-jskit-value-app.yml"

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: LLM bootstrap preflight
        run: ./scripts/llm-preflight.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run -w apps/jskit-value-app format:check

      - name: Lint
        run: npm run -w apps/jskit-value-app lint

      - name: Duplication guardrail
        run: npm run lint:duplication

      - name: Client architecture lint guardrails
        run: npm run lint:architecture:client

      - name: Client architecture test guardrails
        run: npm run test:architecture:client

      - name: API contract docs check
        run: npm run -w apps/jskit-value-app docs:api-contracts:check

      - name: Backend tests
        run: npm run -w apps/jskit-value-app test

      - name: Client tests
        run: npm run -w apps/jskit-value-app test:client

      - name: Dependency audit
        run: npm audit --workspace=apps/jskit-value-app --omit=dev --audit-level=critical
