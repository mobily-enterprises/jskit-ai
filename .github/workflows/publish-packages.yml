name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      since:
        description: Git ref/SHA to diff against (optional)
        required: false
        type: string
      force_all:
        description: Publish all packages regardless of changed paths
        required: false
        type: boolean
        default: false
      dry_run:
        description: Run release planning without publishing
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  npm_config_engine_strict: "true"
  npm_config_strict_allow_scripts: "true"

jobs:
  database-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        database:
          - mariadb
          - postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify a clean database-backed app
        env:
          JSKIT_DATABASE_INTEGRATION_DRIVER: ${{ matrix.database }}
        run: node --test tooling/create-app/test/databaseCi.integration.test.js

  vite-cold-start:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx --yes --allow-scripts=fsevents playwright@1.61.1 install --with-deps chromium

      - name: Verify Vite startup and local-package caching
        env:
          JSKIT_VITE_COLD_START_INTEGRATION: "1"
          JSKIT_VITE_LOCAL_PACKAGE_CACHE_INTEGRATION: "1"
        run: node --test tooling/create-app/test/viteColdStart.integration.test.js

      - name: Verify responsive CRUD date filters
        env:
          JSKIT_USERS_WEB_DATE_FILTER_VISUAL_INTEGRATION: "1"
        run: node --test packages/users-web/test/crudListDateFilterSurface.browser.test.js

  publish:
    needs:
      - database-ci
      - vite-cold-start
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run security:audit

      - name: Publish changed packages
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          args=()

          if [[ "${{ github.event_name }}" == "push" ]]; then
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              args+=(--since "$before")
            else
              args+=(--force-all)
            fi
          else
            input_since="${{ inputs.since }}"
            if [[ -n "$input_since" ]]; then
              args+=(--since "$input_since")
            fi
            if [[ "${{ inputs.force_all }}" == "true" ]]; then
              args+=(--force-all)
            fi
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              args+=(--dry-run)
            fi
          fi

          echo "release args: ${args[*]}"
          npm run release:npm -- "${args[@]}"
